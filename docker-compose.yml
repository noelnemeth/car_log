version: '3.8'

services:
  php:
    image: yiisoftware/yii2-php:8.5-apache-latest
    platform: linux/amd64
    container_name: car_log_web
    volumes:
      - ~/.composer-docker/cache:/root/.composer/cache:delegated
      - ./:/app:delegated
    ports:
      - '8000:80'
    healthcheck:
      test: [
        "CMD-SHELL",
        "if [ \"$(stat -c '%U' /app/runtime)\" != 'www-data' ] || [ \"$(stat -c '%U' /app/web/assets)\" != 'www-data' ] || [ -f /app/db.sqlite ] && [ \"$(stat -c '%U' /app/db.sqlite)\" != 'www-data' ]; then chown -R www-data:www-data /app/runtime /app/web/assets && [ -f /app/db.sqlite ] && chown www-data:www-data /app/db.sqlite && chmod g+w /app; fi && runuser -u www-data -- touch /app/runtime/test_write && rm /app/runtime/test_write && exit 0 || exit 1",
      ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s